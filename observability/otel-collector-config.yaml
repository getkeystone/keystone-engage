# OpenTelemetry Collector configuration for Keystone Engage
# Deployed on Observability-Plane (observability plane)
#
# Receives traces from Keystone Engage services with GenAI semantic conventions.
# Exports to local storage for development; production exports to the
# Observability-Plane Prometheus/Grafana stack.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 256

exporters:
  # Development: log to console
  logging:
    loglevel: info

  # Production: uncomment and configure for Observability-Plane
  # otlp/remote:
  #   endpoint: <otel-host>:4317
  #   tls:
  #     insecure: false

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
